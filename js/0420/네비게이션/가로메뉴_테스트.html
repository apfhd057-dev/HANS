<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        ul,li{
            list-style: none;
        }
        a{text-decoration: none;}

        .nav{margin: 100px;}
        .nav > li{
            float: left;
            width: 150px;
            height: 30px;
            position: relative;
        }
        .nav > li > a{
            font-size: 16px;
            display: block;
            width: 100%;
            height: 30px;
            text-align: center;
            line-height: 30px;
            background-color: rgb(80, 80, 80);
            color: #fff;
            transition: all 0.7s;
        }
        .nav > li > a.over{
            background-color: hsl(0, 0%, 53%);
            color:#000000;
        }
        .nav .sub{
            position: absolute;
            top:30px; left: 0;
            width: 100%;
            display: none;/*기본 숨김 설정*/
        }
        
        .nav .sub li{
            width: 100%;
            height: 30px;
            border-bottom: 1px solid #ccc;
        } 
        .nav .sub a{
            display: block;
            background-color: rgb(184, 184, 184);
            text-align: center;
            line-height: 30px;
        }
        .nav .sub a.on{
            background-color: rgb(84, 84, 84); 
            color: #fff;
        }
    </style>
    <script>
       
    </script>
</head>
<body>
    <ul class="nav">
        <li>
            <a href="">menu1</a>
            <ul class="sub">
                <li><a href="">sub1</a></li>
                <li><a href="">sub2</a></li>
                <li><a href="">sub3</a></li>
                <li><a href="">sub4</a></li>
            </ul>
        </li>
        <li>

            </ul>
        </li>
        <li>
            <a href="">menu3</a>
            <ul class="sub">
                <li><a href="">sub1</a></li>
                <li><a href="">sub2</a></li>
                <li><a href="">sub3</a></li>
                <li><a href="">sub4</a></li>
            </ul>
        </li>
        <li>

</body>
</html>
