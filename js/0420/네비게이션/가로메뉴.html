<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        ul,li{
            list-style: none;
        }
        a{text-decoration: none;}

        .nav{margin: 100px;}
        .nav > li{
            float: left;
            width: 150px;
            height: 30px;
            position: relative;
        }
        .nav > li > a{
            font-size: 16px;
            display: block;
            width: 100%;
            height: 30px;
            text-align: center;
            line-height: 30px;
            background-color: rgb(80, 80, 80);
            color: #fff;
        }
        .nav .sub{
            position: absolute;
            top:30px; left: 0;
            width: 100%;
            display: none;/*기본 숨김 설정*/
        }
        
        .nav .sub li{
            width: 100%;
            height: 30px;
            border-bottom: 1px solid #ccc;
        } 
        .nav .sub a{
            display: block;
            background-color: rgb(184, 184, 184);
            text-align: center;
            line-height: 30px;
        }
    </style>
    <script>
        window.addEventListener('load',()=>{
         const nav = document.querySelector('.nav'); //ul.nav
         const navLi= nav.children;//ul.nav > li
              //console.log(navLi);
              //console.log(navLi.length);
        let link;//마우스이벤트 발생시 a 저장하는 공간
        let sub; //마우스이벤트 발생시 sub 저장하는 공간
              
               for(let i=0; i < navLi.length; i++){// 0 1 2 3 
                    navLi[i].addEventListener('mouseenter',(e)=>{
                         link = e.target.children[0];//a
                         sub = e.target.children[1];//ul.sub
                         sub.style.display="block";
                    })
                    navLi[i].addEventListener('mouseleave',()=>{
                         sub.style.display="none";
                    })
               }
                //nextElementSibling 바로 다음 형제 요소
                //previousElementSibling 바로 이전 형제 요소
                //parentElement 현재 노드의 부모 요소
                //children 현재 요소의 모든 자식 요소
                //firstElementChild 현재 요소의 첫 번째 자식 요소
                //lastElementChild 현재 요소의 마지막 자식 요소
        });
    </script>
</head>
<body>
    <ul class="nav">
        <li>
            <a href="">menu1</a>
            <ul class="sub">
                <li><a href="">sub1</a></li>
                <li><a href="">sub2</a></li>
                <li><a href="">sub3</a></li>
                <li><a href="">sub4</a></li>
            </ul>
        </li>
        <li>
            <a href="">menu2</a>
            <ul class="sub">
                <li><a href="">sub1</a></li>
                <li><a href="">sub2</a></li>
                <li><a href="">sub3</a></li>
                <li><a href="">sub4</a></li>
            </ul>
        </li>
        <li>
            <a href="">menu3</a>
            <ul class="sub">
                <li><a href="">sub1</a></li>
                <li><a href="">sub2</a></li>
                <li><a href="">sub3</a></li>
                <li><a href="">sub4</a></li>
            </ul>
        </li>
        <li>
            <a href="">menu4</a>
            <ul class="sub">
                <li><a href="">sub1</a></li>
                <li><a href="">sub2</a></li>
                <li><a href="">sub3</a></li>
                <li><a href="">sub4</a></li>
            </ul>
        </li>
    </ul>

</body>
</html>
