<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        ul,li{
            list-style: none;
        }
        a{text-decoration: none;}

        /* gnb */
        #gnb{
            position: fixed;
            right: 50px;
            top:50%;
            margin-top: -90px;
            width: 16px;
            height: 180px;
        }
        #gnb li{
            margin-bottom: 15px;
            width: 16px;
            height: 16px;
            background-color: transparent;
            border: 2px solid #000;
            border-radius: 8px;
        }
        #gnb li.active{
            background-color:#000;
        }
        #gnb li a{
            display: block;
            width: 16px;
            height: 16px;
            text-indent: -9999px;
        }

        section{
            width: 100%;
            padding: 20px;
            border-bottom: 2px solid red;
            box-sizing: border-box;
        }
    </style>
    <script>
     window.addEventListener('load',()=>{
      let h; //윈도우의 높이를 저장하는 변수
      let n=0; //버튼 인덱스 값을 지정 초기값 0으로 설정 
      let targety = 0;//상단 목표에 위치값을 저장 변수
      let offsety = 0;//상단 위치를 저장하는 변수
      let timer =0; //현재 움직이는 타이머를 저장하는 변수
      let moving = false; //현재 움직이는 상태를 저장하는 변수

      const container = document.getElementsByClassName('container')[0];//div.container
      const gnb=document.getElementById('gnb');//div#gnb
      const menuList=gnb.children[0].children;//div#gnb > ul >li
      let pageList=[]; //container 자식요소중 section태그만 배열에 저장

     for(let i=0; i<container.children.length;i++){  
        if(container.children[i].tagName == "SECTION"){
              pageList.push(container.children[i]);
        }
     }//console.log(pageList)

     //회면에 설정을 초기화 하는 함수
     function init(){
        //console.log("init")
        h=window.innerHeight;
        targety = n*h;//0
        menuList[n].classList.add('active');//첫번째 버튼에 스타일 적용

        for(let i=0; i <pageList.length; i++){
          pageList[i].style.height=h+"px";
        }
     }
      init(); //초기값 설정 함수 호출

      //화면에 사이즈가 바뀔때 실행하는 함수
      window.addEventListener('resize',init);

     //버튼 이벤트 함수
        for(let i=0; i< menuList.length; i++){
            menuList[i].index = i;
            menuList[i].addEventListener('click',(e)=>{
                e.preventDefault();
                offsety=window.pageYOffset;//현재위치
                n=e.currentTarget.index;//0 1 2 3 4 5 6
                h=window.innerHeight;
                targety=n*h;
                //console.log(targety);
                moveCategory(offsety, targety)
                // for(let mn=0;mn < menuList.length;mn++){
                //    menuList[mn].classList.remove('active');
                // }
                menuList[n].classList.add('active');//첫번째 버튼에 스타일 적용
            });
        }   

     document.addEventListener('scroll',()=>{
        let timer = setInterval(()=>{
                 clearInterval(timer);
                 offsety=window.pageYOffset;//console.logo(offsety);
                if(offsety < pageList[1].offsetTop){
                      n=0;
                }else if(offsety < pageList[2].offsetTop){
                      n=1;
                }else if(offsety < pageList[3].offsetTop){
                      n=2;
                }else if(offsety < pageList[4].offsetTop){
                      n=3;
                }else if(offsety < pageList[5].offsetTop){
                      n=4;
                }else{
                     n=5;
                }  
                
                for(let i=0;i<menuList.length;i++){
                    if(i == n){
                        menuList[i].classList.add('active');
                    }else{
                        menuList[i].classList.remove('active');
                    }
                }

        },10);
     })   
        


    //애니메이션 함수
    function moveCategory(current, target){
        moving = true;

        let timer = setInterval(function(){
                                if(target > current){//스크롤이 아래방향
                                        if(Math.abs(target - current) > 8){
                                            current +=8;//8 16 32 ......499
                                        }else{
                                        current = target; //현재위치값에 목적위치값 대입
                                        moving = false;
                                        clearInterval(timer);
                                        }

                                }else{//스크롤이 위쪽방향
                                        if(Math.abs(target - current) > 8){
                                            current -=8;//500.......7
                                        }else{
                                        current = target; //현재위치값에 목적위치값 대입
                                        moving = false;
                                        clearInterval(timer);
                                        }
                                }
                                //자동실행문에 의해서 이동하는 함수
                                // window.scrollTo(0, current);
                                window.scrollTo({
                                    top:current,
                                    behavior:'smooth'
                                })

                },1)
    }

    
    

     });
    </script>
</head>
<body>
    <div class="container">
        <div id="gnb">
            <ul>
                <li><a href="">menu1</a></li>
                <li><a href="">menu2</a></li>
                <li><a href="">menu3</a></li>
                <li><a href="">menu4</a></li>
                <li><a href="">menu5</a></li>
                <li><a href="">menu6</a></li>
            </ul>
        </div>
        <section id="index"><h3>index</h3></section>
        <section id="page1"><h3>page1</h3></section>
        <section id="page2"><h3>page2</h3></section>
        <section id="page3"><h3>page3</h3></section>
        <section id="page4"><h3>page4</h3></section>
        <section id="page5"><h3>page5</h3></section>
        
    </div>
</body>
</html>
