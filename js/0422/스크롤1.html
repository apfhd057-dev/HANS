<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
        margin: 0;
        padding: 0;
    }

    #wrap{width: 100%;}
    #header{
        width: 100%;
        height: 700px;
        background-color: aquamarine;
    }
    #header > div{
        margin: 50px 20px;
        padding: 20px;
        float: left;
        width: 300px;
        height: 300px;
        border: 1px solid #000;
        opacity: 0;
        transform: translateY(400px);
        transition: all 0.5s;
    }

    #header.active > div{
        opacity: 1;
        transform: translateY(0px);
    }

    #header .type1{
        transition-delay: 0;
    }
    #header .type2{
        transition-delay: 0.5s;
    }
    #header .type3{
        transition-delay: 1s;
    }

    /* page1 */
    #page1{
        width: 100%;
        height: 700px;
        background-color: rgb(233, 219, 32);
    }
    #page1 > div{
        margin: 50px 20px;
        padding: 20px;
        float: left;
        width: 300px;
        height: 300px;
        border: 1px solid #000;
        opacity: 0;
        transform: translateY(400px);
        transition: all 0.5s;
    }

    #page1.active > div{
        opacity: 1;
        transform: translateY(0px);
    }

    #page1 .type1{
        transition-delay: 0;
    }
    #page1 .type2{
        transition-delay: 0.5s;
    }
    #page1 .type3{
        transition-delay: 1s;
    }

    /* page2 */
    #page2{
        width: 100%;
        height: 700px;
        background-color: rgb(197, 122, 216);
    }
    #page2 > div{
        margin: 50px 20px;
        padding: 20px;
        float: left;
        width: 300px;
        height: 300px;
        border: 1px solid #000;
        opacity: 0;
        transform: translateY(100px);
        transition: all 0.5s;
    }

    #page2.active > div{
        opacity: 1;
        transform: translateY(0px);
    }

    #page2 .type1{
        transition-delay: 0;
    }
    #page2 .type2{
        transition-delay: 0.5s;
    }
    #page2 .type3{
        transition-delay: 1s;
    }
    #page3{
        display: none;
        width: 100%;
        height: 900px;
        background-color: rgb(92, 92, 92);
    }
    </style>
    <script>
     window.addEventListener('load',()=>{
       const wrap = document.getElementById('wrap');
       const contents = wrap.children;//header,page1,page2
       let t=window.pageYOffset;
       let offsety = [];//header,page1,page2 각 top값 저장 배열이 저장할 공간
       let n=0;// 현재 콘텐츠 인덱스

       for(let i=0; i < contents.length; i++ ){
          offsety.push(contents[i].offsetTop);
          //header,page1,page2등의 각 top값 저장 배열이 저장하는 메소드
       }console.log(offsety);

       //화면 실행시 첫번째 움직임을 설정
       contents[n].classList.add('active');

       window.addEventListener('scroll',scrollHandler);

       function scrollHandler(){
          let timer = setTimeout(function(){
            t=window.pageYOffset;//현재 스크롤 위치값을 t에 저장
            console.log("t:"+t)

            if(t < offsety[1]){//900
                n=0;
            }else if(t < offsety[2]){//1800
                n=1;
                if(t==(document.body.clientHeight - window.innerHeight)){
                    n=2;
                }
                //document.body.clientHeight 문서의 전체 콘텐츠 높이
                //스크롤로 보이지 않는 영역까지 포함한 높이, 쉽게 말해서 페이지 전체 길이
                //window.innerHeight 현재 브라우저에서 보이는 화면의높이(뷰포트 높이)
                //->사용자가 실제로 화면에 보고 있는 영역 
                //document.body.clientHeight - window.innerHeight = 스크롤이 가능한 전체 영역
            }else{
                n=2;
            }

            for(let j=0; j <contents.length; j++){
                if(n==j){
                    contents[j].classList.add('active');
                }
            }

            if(n == 2){
				window.removeEventListener("scroll", scrollHandler);
                //윈도우창에 권한 해제
                //window.addEventListener('scroll',scrollHandler);
                //윈도우창에 권한 줌, scroll이벤트에 권한 

			}

          },10);
            

          
           
       }


     });
    </script>
</head>
<body>
    <div id="wrap">
        <header id="header">
            <div class="type1">
                <h3>type1</h3>
            </div>
            <div class="type2">
                <h3>type2</h3>
            </div>
            <div class="type3">
                <h3>type3</h3>
            </div>
        </header>
        <section id="page1" >
            <div class="type1">
                <h3>type1</h3>
            </div>
            <div class="type2">
                <h3>type2</h3>
            </div>
            <div class="type3">
                <h3>type3</h3>
            </div>
        </section>
        <section id="page2">
            <div class="type1">
                <h3>type1</h3>
            </div>
            <div class="type2">
                <h3>type2</h3>
            </div>
            <div class="type3">
                <h3>type3</h3>
            </div>
        </section>
        <section id="page3">

        </section>
    </div>
</body>
</html>
